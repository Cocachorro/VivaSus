<!doctype html>
<html lang="pt-br">

        <nav>

    <main>

      <a href="navegacao/exames.html" class="card_container"> <!-- Card de Receitas -->

          />

        <div class="descricao">

        </div>

      <a href="navegacao/exames.html" class="card_container"> <!-- Card de Histórico de Atendimentos -->
        <div>
          <img style="width: 50px;"
            class="icone"
            src="assets/media/images/historico.png"

          />
